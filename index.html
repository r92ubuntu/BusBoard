<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BusBoard - Pantalla</title>
    <link rel="stylesheet" href="./styles.css?v=20260522-prod4">
  </head>
  <body>
    <main class="shell screen-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Terminal Central</p>
          <h1>Salidas y llegadas</h1>
        </div>
        <div class="clock" aria-live="polite">
          <span id="dateLabel"></span>
          <strong id="timeLabel"></strong>
        </div>
      </header>

      <section class="station-switcher" aria-label="Seleccion de estacion">
        <label>
          Estacion
          <select id="publicStation"></select>
        </label>
        <span id="pageLabel">Pagina 1</span>
      </section>

      <section class="notice" aria-live="polite">
        <span class="notice-dot"></span>
        <span id="noticeText">Actualizando horarios...</span>
      </section>

      <section class="display-grid">
        <section class="board active-board">
          <div class="board-head">
            <h2 id="boardTitle">Salidas</h2>
            <span id="boardCount">0 rutas</span>
          </div>
          <div class="table" role="table" aria-label="Horarios de buses">
            <div class="table-row table-header" role="row">
              <span role="columnheader">Hora</span>
              <span id="placeHeader" role="columnheader">Destino</span>
              <span role="columnheader">Estado</span>
            </div>
            <div id="boardRows"></div>
          </div>
        </section>

        <aside class="ad-panel" aria-label="Publicidad">
          <div id="adStage" class="ad-stage"></div>
        </aside>
      </section>

      <section class="mobile-actions" aria-label="Filtros">
        <button class="active" data-filter="all" type="button">Todo</button>
        <button data-filter="departures" type="button">Salidas</button>
        <button data-filter="arrivals" type="button">Llegadas</button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./data.js?v=20260522-prod4"></script>
    <script src="./supabase-db.js?v=20260522-prod4"></script>
    <script src="./pantalla/lista.js?v=20260522-prod4"></script>
    <script src="./pantalla/config.js?v=20260522-prod4"></script>
    <script src="./app.js?v=20260522-prod4"></script>
  </body>
</html>
